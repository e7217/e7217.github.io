remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

locale: "ko-KR"
title: "e7217 Dev Log"
title_separator: "-"
subtitle: "스마트팩토리 · AI · 개발 기록"
name: "e7217"
description: "스마트팩토리와 AI를 중심으로 개인 프로젝트와 개발 과정을 기록합니다."
url: "https://e7217.github.io"
baseurl: ""
repository: "e7217/e7217.github.io"
masthead_title: "e7217 Dev Log"
breadcrumbs: true
words_per_minute: 200
timezone: "Asia/Seoul"

search: true
search_full_content: false
search_provider: lunr

comments:
  provider: false

atom_feed:
  path: feed.xml

author:
  name: "e7217"
  bio: "스마트팩토리와 AI를 중심으로 자동화, 데이터, 서비스 구현 과정을 기록합니다."
  location: "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/e7217"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/e7217"

social:
  type: Person
  name: "e7217"
  links:
    - "https://github.com/e7217"

include:
  - _pages

exclude:
  - docs
  - README.md
  - vendor
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .bundle
  - .jekyll-cache
  - .sass-cache

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

whitelist:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

collections:
  projects:
    output: true
    permalink: /projects/:path/

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: true
